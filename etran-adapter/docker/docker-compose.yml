version: "3.9"

services:
  etran-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    ports:
      - "8100:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres

  etran-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etran_adapter
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
